# 工作流名称
name: Deploy MkDocs to Pages

on:
  # 推送到 main 分支时触发
  push:
    branches: ["main"]

  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：只允许一个部署任务运行，跳过队列中等待的但不会取消正在进行的
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建作业
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'  # 使用最新的 Python 3.x

      - name: Install dependencies
        run: |
          pip install mkdocs  # 安装 MkDocs 核心
          # 如果使用了主题或插件，可以在这里一起安装，例如：
          # pip install mkdocs-material

      - name: Build site
        run: mkdocs build  # 生成 site 目录

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'  # 上传生成的 site 目录

  # 部署作业
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build  # 等待构建完成
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
